<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="calculator" aria-label="계산기">
      <div class="screen">
        <p id="history" class="history" aria-live="polite"></p>
        <p id="display" class="display" aria-live="polite">0</p>
      </div>

      <div class="keys" role="group" aria-label="계산 버튼">
        <button class="key key-action" data-action="clear">AC</button>
        <button class="key key-action" data-action="delete">DEL</button>
        <button class="key key-action" data-action="percent">%</button>
        <button class="key key-operator" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key key-operator" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key key-operator" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key key-operator" data-value="+">＋</button>

        <button class="key key-zero" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key key-equals" data-action="equals">=</button>
      </div>
    </section>
    <p class="hint">키보드 숫자/연산자 입력도 지원함.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
