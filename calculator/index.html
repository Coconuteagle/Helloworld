<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Context Repo Calculator</title>
  <meta name="description" content="AI에게 매번 맥락을 다시 설명하는 비용과 context repo 구축 효과를 빠르게 계산하는 도구" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080b;
      --panel: #101219;
      --panel-2: #161a24;
      --ink: #f5f7fb;
      --muted: #98a2b3;
      --line: rgba(255,255,255,.1);
      --accent: #8b5cf6;
      --accent-2: #22d3ee;
      --good: #34d399;
      --warn: #fbbf24;
      --shadow: 0 24px 80px rgba(0,0,0,.48);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(139,92,246,.28), transparent 34%),
        radial-gradient(circle at 88% 8%, rgba(34,211,238,.18), transparent 30%),
        linear-gradient(180deg, #07080b 0%, #0b0d13 52%, #07080b 100%);
      color: var(--ink);
    }
    .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 48px 0; }
    header { display: grid; gap: 14px; margin-bottom: 28px; }
    .eyebrow { color: var(--accent-2); font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(32px, 6vw, 68px); line-height: .95; letter-spacing: -.06em; max-width: 860px; }
    .lead { color: var(--muted); font-size: clamp(16px, 2vw, 20px); line-height: 1.65; max-width: 760px; margin: 0; }
    .grid { display: grid; grid-template-columns: 1.08fr .92fr; gap: 20px; align-items: start; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035)); border: 1px solid var(--line); border-radius: 28px; box-shadow: var(--shadow); overflow: hidden; }
    .card-inner { padding: 24px; }
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    h2 { margin: 0; font-size: 19px; letter-spacing: -.02em; }
    .pill { border: 1px solid rgba(139,92,246,.35); color: #d8ccff; background: rgba(139,92,246,.12); padding: 7px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    label { display: grid; gap: 8px; color: #d8dee9; font-size: 14px; font-weight: 650; }
    .hint { color: var(--muted); font-size: 12px; font-weight: 500; }
    .inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    input, select, button { font: inherit; }
    input, select {
      width: 100%; border: 1px solid var(--line); background: rgba(3,6,14,.72); color: var(--ink);
      border-radius: 16px; padding: 14px 14px; outline: none;
    }
    input:focus, select:focus { border-color: rgba(34,211,238,.7); box-shadow: 0 0 0 4px rgba(34,211,238,.08); }
    .results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; }
    .metric { background: rgba(255,255,255,.055); border: 1px solid var(--line); border-radius: 20px; padding: 16px; min-height: 108px; }
    .metric b { display: block; font-size: clamp(22px, 3.5vw, 34px); letter-spacing: -.05em; margin: 8px 0 4px; }
    .metric span { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .metric.good b { color: var(--good); }
    .metric.warn b { color: var(--warn); }
    .formula { margin-top: 16px; color: var(--muted); font-size: 13px; line-height: 1.7; background: rgba(0,0,0,.2); border: 1px dashed rgba(255,255,255,.12); border-radius: 18px; padding: 14px; }
    .calc-screen { background: #05070d; border: 1px solid var(--line); border-radius: 22px; padding: 18px; min-height: 108px; display: grid; align-content: end; gap: 8px; margin-bottom: 14px; }
    #expr { color: var(--muted); min-height: 20px; word-break: break-all; text-align: right; }
    #value { font-size: clamp(34px, 7vw, 56px); line-height: 1; letter-spacing: -.06em; text-align: right; overflow-wrap: anywhere; }
    .keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    button { border: 0; border-radius: 18px; padding: 16px 10px; min-height: 56px; cursor: pointer; color: var(--ink); background: rgba(255,255,255,.08); transition: transform .12s ease, background .12s ease; }
    button:hover { transform: translateY(-1px); background: rgba(255,255,255,.13); }
    button:active { transform: translateY(1px) scale(.99); }
    button.op { background: rgba(139,92,246,.24); color: #e8ddff; }
    button.equal { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-weight: 800; }
    button.clear { color: #fecaca; background: rgba(239,68,68,.16); }
    .wide { grid-column: span 2; }
    .footer-note { margin-top: 18px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    @media (max-width: 860px) { .grid, .inputs, .results { grid-template-columns: 1fr; } .wrap { padding: 28px 0; } .card-inner { padding: 18px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="eyebrow">Brain Repo ROI</div>
      <h1>맥락 다시 설명하는 비용, 숫자로 까보는 계산기.</h1>
      <p class="lead">학교 행정, 결혼 준비, Life OS, AI 도구 실험을 context repo로 고정했을 때 매달 얼마나 시간을 아끼는지 바로 계산한다.</p>
    </header>

    <section class="grid">
      <div class="card">
        <div class="card-inner">
          <div class="section-title">
            <h2>Context repo 절감 계산</h2>
            <span class="pill">30초 입력</span>
          </div>
          <div class="inputs">
            <label>AI 작업 횟수 / 주
              <input id="tasks" type="number" min="0" step="1" value="18" />
              <span class="hint">메모 정리, 행정 질의, 자동화 수정 등</span>
            </label>
            <label>매번 맥락 설명 시간(분)
              <input id="contextMin" type="number" min="0" step="0.5" value="7" />
              <span class="hint">파일 위치/결정/열린 루프 설명 시간</span>
            </label>
            <label>repo로 줄어드는 비율
              <select id="saveRate">
                <option value="0.35">35% 보수적</option>
                <option value="0.5" selected>50% 현실적</option>
                <option value="0.7">70% 공격적</option>
              </select>
              <span class="hint">README/decisions/open-loops/assets 기준</span>
            </label>
            <label>내 시간 가치(원/시간)
              <input id="hourly" type="number" min="0" step="1000" value="30000" />
              <span class="hint">감 잡기용. 0 넣어도 됨</span>
            </label>
            <label>repo 관리 시간(분/주)
              <input id="maint" type="number" min="0" step="1" value="20" />
              <span class="hint">주간 README/결정사항 업데이트</span>
            </label>
            <label>초기 구축 시간(분)
              <input id="setup" type="number" min="0" step="5" value="30" />
              <span class="hint">처음 폴더 4개와 파일 4종 박는 시간</span>
            </label>
          </div>

          <div class="results" aria-live="polite">
            <div class="metric good"><span>순절감 / 월</span><b id="netHours">0h</b><span>절감 시간 - 관리 시간</span></div>
            <div class="metric"><span>환산 가치 / 월</span><b id="money">₩0</b><span>시간 가치를 넣었을 때</span></div>
            <div class="metric warn"><span>초기 구축 회수</span><b id="payback">0주</b><span>30분 실험이 갚히는 속도</span></div>
          </div>
          <div class="formula" id="formula"></div>
        </div>
      </div>

      <aside class="card">
        <div class="card-inner">
          <div class="section-title">
            <h2>그냥 계산기</h2>
            <span class="pill">Basic</span>
          </div>
          <div class="calc-screen">
            <div id="expr"></div>
            <div id="value">0</div>
          </div>
          <div class="keys" id="keys">
            <button class="clear" data-key="C">C</button>
            <button data-key="back">⌫</button>
            <button data-key="%">%</button>
            <button class="op" data-key="/">÷</button>
            <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button class="op" data-key="*">×</button>
            <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button><button class="op" data-key="-">−</button>
            <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button><button class="op" data-key="+">＋</button>
            <button class="wide" data-key="0">0</button><button data-key=".">.</button><button class="equal" data-key="=">=</button>
          </div>
          <p class="footer-note">키보드 숫자와 연산자도 먹는다. 위험한 eval 안 쓰고 안전한 토큰 계산으로 처리함.</p>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const won = new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 });
    function fmtHours(h) { return h < 1 ? `${Math.round(h * 60)}m` : `${Number(h.toFixed(1))}h`; }
    function updateRoi() {
      const tasks = Number($('tasks').value || 0);
      const contextMin = Number($('contextMin').value || 0);
      const saveRate = Number($('saveRate').value || 0);
      const hourly = Number($('hourly').value || 0);
      const maint = Number($('maint').value || 0);
      const setup = Number($('setup').value || 0);
      const grossMinMonth = tasks * contextMin * saveRate * 4.345;
      const maintMinMonth = maint * 4.345;
      const netMinMonth = Math.max(0, grossMinMonth - maintMinMonth);
      const netHours = netMinMonth / 60;
      const weeklyNetMin = Math.max(0, tasks * contextMin * saveRate - maint);
      const paybackWeeks = weeklyNetMin > 0 ? setup / weeklyNetMin : Infinity;
      $('netHours').textContent = fmtHours(netHours);
      $('money').textContent = won.format(netHours * hourly);
      $('payback').textContent = Number.isFinite(paybackWeeks) ? `${Math.max(0.1, paybackWeeks).toFixed(1)}주` : '회수 안 됨';
      $('formula').innerHTML = `월 절감 = ${tasks}회/주 × ${contextMin}분 × ${(saveRate*100).toFixed(0)}% × 4.345 - 관리 ${maint}분/주 × 4.345<br>결론: ${fmtHours(netHours)}/월 절감. ${netHours >= 3 ? 'repo 만들 가치 있음.' : netHours >= 1 ? '작게 시작하면 됨.' : '아직은 과함.'}`;
    }
    ['tasks','contextMin','saveRate','hourly','maint','setup'].forEach(id => $(id).addEventListener('input', updateRoi));
    updateRoi();

    let expression = '';
    const isOp = (c) => ['+','-','*','/','%'].includes(c);
    function tokenize(s) { return s.match(/(\d+\.?\d*|\.\d+|[+\-*/%])/g) || []; }
    function safeCalc(s) {
      const tokens = tokenize(s);
      if (!tokens.length || isOp(tokens[tokens.length - 1])) throw new Error('bad');
      const out = [], ops = [], prec = { '+':1, '-':1, '*':2, '/':2, '%':2 };
      for (const t of tokens) {
        if (!Number.isNaN(Number(t))) out.push(Number(t));
        else if (isOp(t)) { while (ops.length && prec[ops.at(-1)] >= prec[t]) out.push(ops.pop()); ops.push(t); }
      }
      while (ops.length) out.push(ops.pop());
      const st = [];
      for (const t of out) {
        if (typeof t === 'number') st.push(t);
        else { const b = st.pop(), a = st.pop(); if (a === undefined || b === undefined) throw new Error('bad'); st.push(t==='+'?a+b:t==='-'?a-b:t==='*'?a*b:t==='/'?a/b:a%b); }
      }
      const result = st[0];
      if (!Number.isFinite(result)) throw new Error('bad');
      return Math.round(result * 1e10) / 1e10;
    }
    function renderCalc(result) {
      $('expr').textContent = expression.replaceAll('*','×').replaceAll('/','÷');
      $('value').textContent = result ?? (expression || '0');
    }
    function press(key) {
      if (key === 'C') { expression = ''; renderCalc(); return; }
      if (key === 'back') { expression = expression.slice(0, -1); renderCalc(); return; }
      if (key === '=') { try { const r = safeCalc(expression); $('expr').textContent = expression.replaceAll('*','×').replaceAll('/','÷'); $('value').textContent = r; expression = String(r); } catch { $('value').textContent = 'Error'; } return; }
      if ('0123456789.'.includes(key)) expression += key;
      if (isOp(key) && expression && !isOp(expression.at(-1))) expression += key;
      renderCalc();
    }
    $('keys').addEventListener('click', (e) => { const b = e.target.closest('button'); if (b) press(b.dataset.key); });
    window.addEventListener('keydown', (e) => { const k = e.key === 'Enter' ? '=' : e.key === 'Backspace' ? 'back' : e.key; if ('0123456789.+-*/%='.includes(k) || k === 'back') { e.preventDefault(); press(k); } });
  </script>
</body>
</html>
